openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Roster HR Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: User profile
  - name: departments
    description: Department management
  - name: designations
    description: Designation management
  - name: employees
    description: Employee management
  - name: attendance
    description: Attendance tracking
  - name: leave
    description: Leave management
  - name: payroll
    description: Payroll management
  - name: performance
    description: Performance management
  - name: documents
    description: Document management
  - name: announcements
    description: Announcements
  - name: holidays
    description: Holiday calendar
  - name: dashboard
    description: Dashboard data
  - name: reports
    description: Reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Profile ────────────────────────────────────────────────────────────────
  /profile/me:
    get:
      operationId: getMe
      tags: [profile]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [profile]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  # ── Departments ────────────────────────────────────────────────────────────
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Designations ───────────────────────────────────────────────────────────
  /designations:
    get:
      operationId: listDesignations
      tags: [designations]
      summary: List all designations
      responses:
        "200":
          description: List of designations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Designation"
    post:
      operationId: createDesignation
      tags: [designations]
      summary: Create designation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DesignationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Designation"

  /designations/{id}:
    patch:
      operationId: updateDesignation
      tags: [designations]
      summary: Update designation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DesignationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Designation"
    delete:
      operationId: deleteDesignation
      tags: [designations]
      summary: Delete designation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Employees ──────────────────────────────────────────────────────────────
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees with optional filters
      parameters:
        - name: department
          in: query
          schema:
            type: ["integer", "null"]
        - name: designation
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of employees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeList"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create new employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get employee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Soft-delete employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /employees/{id}/direct-reports:
    get:
      operationId: getDirectReports
      tags: [employees]
      summary: Get direct reports for an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of direct reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeSummary"

  /employees/org-chart:
    get:
      operationId: getOrgChart
      tags: [employees]
      summary: Get org chart tree
      responses:
        "200":
          description: Org chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgChartNode"

  # ── Attendance ─────────────────────────────────────────────────────────────
  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: date
          in: query
          schema:
            type: ["string", "null"]
        - name: startDate
          in: query
          schema:
            type: ["string", "null"]
        - name: endDate
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    post:
      operationId: markAttendance
      tags: [attendance]
      summary: Mark attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "201":
          description: Attendance marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/today:
    get:
      operationId: getTodayAttendance
      tags: [attendance]
      summary: Get today's attendance for all employees (manager/HR view)
      responses:
        "200":
          description: Today's attendance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/check-in:
    post:
      operationId: checkIn
      tags: [attendance]
      summary: Employee clock in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInInput"
      responses:
        "200":
          description: Checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/check-out:
    post:
      operationId: checkOut
      tags: [attendance]
      summary: Employee clock out
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckOutInput"
      responses:
        "200":
          description: Checked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  # ── Leave Types ────────────────────────────────────────────────────────────
  /leave/types:
    get:
      operationId: listLeaveTypes
      tags: [leave]
      summary: List leave types
      responses:
        "200":
          description: Leave types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveType"
    post:
      operationId: createLeaveType
      tags: [leave]
      summary: Create leave type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveTypeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveType"

  /leave/types/{id}:
    patch:
      operationId: updateLeaveType
      tags: [leave]
      summary: Update leave type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveTypeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveType"

  # ── Leave Balances ─────────────────────────────────────────────────────────
  /leave/balances:
    get:
      operationId: listLeaveBalances
      tags: [leave]
      summary: List leave balances
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: year
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Leave balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveBalance"

  # ── Leave Requests ─────────────────────────────────────────────────────────
  /leave/requests:
    get:
      operationId: listLeaveRequests
      tags: [leave]
      summary: List leave requests
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: startDate
          in: query
          schema:
            type: ["string", "null"]
        - name: endDate
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Leave requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveRequest"
    post:
      operationId: createLeaveRequest
      tags: [leave]
      summary: Apply for leave
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveRequestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /leave/requests/{id}:
    get:
      operationId: getLeaveRequest
      tags: [leave]
      summary: Get leave request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leave request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"
    patch:
      operationId: updateLeaveRequest
      tags: [leave]
      summary: Update leave request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /leave/calendar:
    get:
      operationId: getLeaveCalendar
      tags: [leave]
      summary: Team leave calendar (who is out)
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Leave calendar events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveCalendarEvent"

  # ── Payroll ────────────────────────────────────────────────────────────────
  /payroll/structures:
    get:
      operationId: listPayrollStructures
      tags: [payroll]
      summary: List payroll structures
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Payroll structures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayrollStructure"
    post:
      operationId: createPayrollStructure
      tags: [payroll]
      summary: Create payroll structure for employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayrollStructureInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollStructure"

  /payroll/structures/{id}:
    patch:
      operationId: updatePayrollStructure
      tags: [payroll]
      summary: Update payroll structure
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayrollStructureUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollStructure"

  /payroll/payslips:
    get:
      operationId: listPayslips
      tags: [payroll]
      summary: List payslips
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: year
          in: query
          schema:
            type: ["integer", "null"]
        - name: month
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Payslips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payslip"
    post:
      operationId: generatePayslip
      tags: [payroll]
      summary: Generate payslip for employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayslipInput"
      responses:
        "201":
          description: Generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payslip"

  # ── Performance ────────────────────────────────────────────────────────────
  /performance/reviews:
    get:
      operationId: listPerformanceReviews
      tags: [performance]
      summary: List performance reviews
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Performance reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PerformanceReview"
    post:
      operationId: createPerformanceReview
      tags: [performance]
      summary: Create performance review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerformanceReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceReview"

  /performance/reviews/{id}:
    patch:
      operationId: updatePerformanceReview
      tags: [performance]
      summary: Update/acknowledge performance review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerformanceReviewUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceReview"

  /performance/goals:
    get:
      operationId: listGoals
      tags: [performance]
      summary: List goals
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"
    post:
      operationId: createGoal
      tags: [performance]
      summary: Create goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

  /performance/goals/{id}:
    patch:
      operationId: updateGoal
      tags: [performance]
      summary: Update goal progress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
    delete:
      operationId: deleteGoal
      tags: [performance]
      summary: Delete goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Documents ──────────────────────────────────────────────────────────────
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: type
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Upload a document record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Announcements ──────────────────────────────────────────────────────────
  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      parameters:
        - name: departmentId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    patch:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /announcements/{id}/mark-seen:
    post:
      operationId: markAnnouncementSeen
      tags: [announcements]
      summary: Mark an announcement as seen by the current user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as seen
          content:
            application/json:
              schema:
                type: object
                required: [announcementId, seenAt]
                properties:
                  announcementId:
                    type: integer
                  seenAt:
                    type: string

  /announcements/{id}/reads:
    get:
      operationId: getAnnouncementReads
      tags: [announcements]
      summary: Get read receipts for an announcement (HR only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of employees who have read this announcement
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnnouncementReadReceipt"

  # ── Holidays ───────────────────────────────────────────────────────────────
  /holidays:
    get:
      operationId: listHolidays
      tags: [holidays]
      summary: List holidays
      parameters:
        - name: year
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Holidays
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Holiday"
    post:
      operationId: createHoliday
      tags: [holidays]
      summary: Create holiday
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HolidayInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Holiday"

  /holidays/{id}:
    patch:
      operationId: updateHoliday
      tags: [holidays]
      summary: Update holiday
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HolidayUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Holiday"
    delete:
      operationId: deleteHoliday
      tags: [holidays]
      summary: Delete holiday
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Dashboard ──────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Company-wide KPI stats (HR Admin view)
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/my-stats:
    get:
      operationId: getMyStats
      tags: [dashboard]
      summary: Personal stats for current employee
      responses:
        "200":
          description: Personal stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyStats"

  /dashboard/headcount-by-dept:
    get:
      operationId: getHeadcountByDept
      tags: [dashboard]
      summary: Headcount breakdown by department
      responses:
        "200":
          description: Headcount by department
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeadcountByDept"

  /dashboard/leave-trend:
    get:
      operationId: getLeaveTrend
      tags: [dashboard]
      summary: Leave requests trend over time
      parameters:
        - name: months
          in: query
          schema:
            type: integer
            default: 6
      responses:
        "200":
          description: Leave trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveTrendPoint"

  /dashboard/upcoming-events:
    get:
      operationId: getUpcomingEvents
      tags: [dashboard]
      summary: Upcoming holidays and work anniversaries
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingEvent"

  /dashboard/team-attendance:
    get:
      operationId: getTeamAttendance
      tags: [dashboard]
      summary: Today's team attendance snapshot (manager view)
      responses:
        "200":
          description: Team attendance today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamAttendanceSnapshot"

  /dashboard/pending-approvals:
    get:
      operationId: getPendingApprovals
      tags: [dashboard]
      summary: Pending leave approvals for manager/HR
      responses:
        "200":
          description: Pending approvals count and list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingApprovals"

  # ── Reports ────────────────────────────────────────────────────────────────
  /reports/headcount:
    get:
      operationId: getHeadcountReport
      tags: [reports]
      summary: Headcount over time
      parameters:
        - name: months
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Headcount over time
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeadcountPoint"

  /reports/leave-utilization:
    get:
      operationId: getLeaveUtilizationReport
      tags: [reports]
      summary: Leave utilization by type and department
      parameters:
        - name: year
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Leave utilization data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveUtilizationPoint"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Profile ──────────────────────────────────────────────────────────────
    Profile:
      type: object
      required: [id, clerkId, role, createdAt]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: ["string", "null"]
        fullName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [super_admin, hr_admin, manager, employee]
        employeeId:
          type: ["integer", "null"]
        createdAt:
          type: string

    ProfileUpdate:
      type: object
      properties:
        fullName:
          type: string
        avatarUrl:
          type: ["string", "null"]

    # ── Departments ──────────────────────────────────────────────────────────
    Department:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        headId:
          type: ["integer", "null"]
        employeeCount:
          type: integer
        createdAt:
          type: string

    DepartmentInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        headId:
          type: ["integer", "null"]

    DepartmentUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        headId:
          type: ["integer", "null"]

    # ── Designations ─────────────────────────────────────────────────────────
    Designation:
      type: object
      required: [id, name, departmentId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        departmentId:
          type: integer
        departmentName:
          type: ["string", "null"]
        createdAt:
          type: string

    DesignationInput:
      type: object
      required: [name, departmentId]
      properties:
        name:
          type: string
          minLength: 1
        departmentId:
          type: integer

    DesignationUpdate:
      type: object
      properties:
        name:
          type: string
        departmentId:
          type: integer

    # ── Employees ─────────────────────────────────────────────────────────────
    EmployeeSummary:
      type: object
      required: [id, fullName, employeeCode, status]
      properties:
        id:
          type: integer
        fullName:
          type: string
        employeeCode:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        departmentName:
          type: ["string", "null"]
        designationName:
          type: ["string", "null"]
        status:
          type: string

    Employee:
      type: object
      required: [id, fullName, employeeCode, email, status, hireDate, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        employeeCode:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
        designationId:
          type: ["integer", "null"]
        designationName:
          type: ["string", "null"]
        managerId:
          type: ["integer", "null"]
        managerName:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive, on_leave, terminated]
        employmentType:
          type: string
          enum: [full_time, part_time, contract, intern]
        hireDate:
          type: string
        salary:
          type: ["number", "null"]
        emergencyContactName:
          type: ["string", "null"]
        emergencyContactPhone:
          type: ["string", "null"]
        createdAt:
          type: string

    EmployeeList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/EmployeeSummary"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    EmployeeInput:
      type: object
      required: [fullName, email, hireDate]
      properties:
        fullName:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        dateOfBirth:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        departmentId:
          type: ["integer", "null"]
        designationId:
          type: ["integer", "null"]
        managerId:
          type: ["integer", "null"]
        status:
          type: string
          default: active
        employmentType:
          type: string
          default: full_time
        hireDate:
          type: string
        salary:
          type: ["number", "null"]
        emergencyContactName:
          type: ["string", "null"]
        emergencyContactPhone:
          type: ["string", "null"]

    EmployeeUpdate:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        departmentId:
          type: ["integer", "null"]
        designationId:
          type: ["integer", "null"]
        managerId:
          type: ["integer", "null"]
        status:
          type: string
        employmentType:
          type: string
        hireDate:
          type: string
        salary:
          type: ["number", "null"]
        emergencyContactName:
          type: ["string", "null"]
        emergencyContactPhone:
          type: ["string", "null"]

    OrgChartNode:
      type: object
      required: [id, fullName]
      properties:
        id:
          type: integer
        fullName:
          type: string
        designationName:
          type: ["string", "null"]
        departmentName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        managerId:
          type: ["integer", "null"]
        children:
          type: array
          items:
            $ref: "#/components/schemas/OrgChartNode"

    # ── Attendance ────────────────────────────────────────────────────────────
    AttendanceRecord:
      type: object
      required: [id, employeeId, date, status, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employeeName:
          type: ["string", "null"]
        date:
          type: string
        status:
          type: string
          enum: [present, absent, wfh, half_day, late]
        checkIn:
          type: ["string", "null"]
        checkOut:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    AttendanceInput:
      type: object
      required: [employeeId, date, status]
      properties:
        employeeId:
          type: integer
        date:
          type: string
        status:
          type: string
        checkIn:
          type: ["string", "null"]
        checkOut:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    CheckInInput:
      type: object
      required: [employeeId]
      properties:
        employeeId:
          type: integer
        notes:
          type: ["string", "null"]

    CheckOutInput:
      type: object
      required: [employeeId]
      properties:
        employeeId:
          type: integer
        notes:
          type: ["string", "null"]

    # ── Leave ─────────────────────────────────────────────────────────────────
    LeaveType:
      type: object
      required: [id, name, defaultDays, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        defaultDays:
          type: integer
        carryForward:
          type: boolean
        isPaid:
          type: boolean
        createdAt:
          type: string

    LeaveTypeInput:
      type: object
      required: [name, defaultDays]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        defaultDays:
          type: integer
        carryForward:
          type: boolean
          default: false
        isPaid:
          type: boolean
          default: true

    LeaveTypeUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        defaultDays:
          type: integer
        carryForward:
          type: boolean
        isPaid:
          type: boolean

    LeaveBalance:
      type: object
      required: [id, employeeId, leaveTypeId, year, allocated, used, remaining]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employeeName:
          type: ["string", "null"]
        leaveTypeId:
          type: integer
        leaveTypeName:
          type: ["string", "null"]
        year:
          type: integer
        allocated:
          type: integer
        used:
          type: integer
        remaining:
          type: integer

    LeaveRequest:
      type: object
      required: [id, employeeId, leaveTypeId, startDate, endDate, status, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employeeName:
          type: ["string", "null"]
        leaveTypeId:
          type: integer
        leaveTypeName:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: string
        isHalfDay:
          type: boolean
        totalDays:
          type: number
        reason:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected, cancelled]
        reviewedById:
          type: ["integer", "null"]
        reviewedByName:
          type: ["string", "null"]
        reviewedAt:
          type: ["string", "null"]
        reviewNotes:
          type: ["string", "null"]
        createdAt:
          type: string

    LeaveRequestInput:
      type: object
      required: [leaveTypeId, startDate, endDate]
      properties:
        leaveTypeId:
          type: integer
        startDate:
          type: string
        endDate:
          type: string
        isHalfDay:
          type: boolean
          default: false
        reason:
          type: ["string", "null"]

    LeaveStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected, cancelled]
        reviewNotes:
          type: ["string", "null"]

    LeaveCalendarEvent:
      type: object
      required: [employeeId, employeeName, startDate, endDate, leaveType, status]
      properties:
        employeeId:
          type: integer
        employeeName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: string
        leaveType:
          type: string
        status:
          type: string

    # ── Payroll ───────────────────────────────────────────────────────────────
    PayrollStructure:
      type: object
      required: [id, employeeId, basicPay, effectiveDate, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employeeName:
          type: ["string", "null"]
        basicPay:
          type: number
        allowances:
          type: object
        deductions:
          type: object
        grossPay:
          type: number
        netPay:
          type: number
        effectiveDate:
          type: string
        createdAt:
          type: string

    PayrollStructureInput:
      type: object
      required: [employeeId, basicPay, effectiveDate]
      properties:
        employeeId:
          type: integer
        basicPay:
          type: number
        allowances:
          type: object
        deductions:
          type: object
        effectiveDate:
          type: string

    PayrollStructureUpdate:
      type: object
      properties:
        basicPay:
          type: number
        allowances:
          type: object
        deductions:
          type: object
        effectiveDate:
          type: string

    Payslip:
      type: object
      required: [id, employeeId, month, year, grossPay, netPay, status, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employeeName:
          type: ["string", "null"]
        month:
          type: integer
        year:
          type: integer
        basicPay:
          type: number
        allowances:
          type: object
        deductions:
          type: object
        grossPay:
          type: number
        netPay:
          type: number
        status:
          type: string
          enum: [draft, published]
        createdAt:
          type: string

    PayslipInput:
      type: object
      required: [employeeId, month, year]
      properties:
        employeeId:
          type: integer
        month:
          type: integer
        year:
          type: integer

    # ── Performance ───────────────────────────────────────────────────────────
    PerformanceReview:
      type: object
      required: [id, employeeId, reviewerId, rating, period, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employeeName:
          type: ["string", "null"]
        reviewerId:
          type: integer
        reviewerName:
          type: ["string", "null"]
        rating:
          type: integer
        period:
          type: string
        strengths:
          type: ["string", "null"]
        improvements:
          type: ["string", "null"]
        employeeComment:
          type: ["string", "null"]
        acknowledged:
          type: boolean
        createdAt:
          type: string

    PerformanceReviewInput:
      type: object
      required: [employeeId, rating, period]
      properties:
        employeeId:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        period:
          type: string
        strengths:
          type: ["string", "null"]
        improvements:
          type: ["string", "null"]

    PerformanceReviewUpdate:
      type: object
      properties:
        rating:
          type: integer
        strengths:
          type: ["string", "null"]
        improvements:
          type: ["string", "null"]
        employeeComment:
          type: ["string", "null"]
        acknowledged:
          type: boolean

    Goal:
      type: object
      required: [id, employeeId, title, targetDate, progress, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employeeName:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        targetDate:
          type: string
        progress:
          type: integer
        createdAt:
          type: string

    GoalInput:
      type: object
      required: [employeeId, title, targetDate]
      properties:
        employeeId:
          type: integer
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        targetDate:
          type: string
        progress:
          type: integer
          default: 0

    GoalUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        targetDate:
          type: string
        progress:
          type: integer
          minimum: 0
          maximum: 100

    # ── Documents ─────────────────────────────────────────────────────────────
    Document:
      type: object
      required: [id, name, type, uploadedById, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: ["integer", "null"]
        employeeName:
          type: ["string", "null"]
        name:
          type: string
        type:
          type: string
          enum: [contract, id_proof, certificate, policy, other]
        fileUrl:
          type: ["string", "null"]
        fileSize:
          type: ["integer", "null"]
        uploadedById:
          type: integer
        isCompanyPolicy:
          type: boolean
        createdAt:
          type: string

    DocumentInput:
      type: object
      required: [name, type]
      properties:
        employeeId:
          type: ["integer", "null"]
        name:
          type: string
          minLength: 1
        type:
          type: string
        fileUrl:
          type: ["string", "null"]
        fileSize:
          type: ["integer", "null"]
        isCompanyPolicy:
          type: boolean
          default: false

    # ── Announcements ─────────────────────────────────────────────────────────
    Announcement:
      type: object
      required: [id, title, content, postedById, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
        postedById:
          type: integer
        postedByName:
          type: ["string", "null"]
        isPinned:
          type: boolean
        createdAt:
          type: string
        seenByMe:
          type: boolean
        seenCount:
          type: integer

    AnnouncementReadReceipt:
      type: object
      required: [profileId, fullName, seenAt]
      properties:
        profileId:
          type: integer
        fullName:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        seenAt:
          type: string

    AnnouncementInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        departmentId:
          type: ["integer", "null"]
        isPinned:
          type: boolean
          default: false

    AnnouncementUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        departmentId:
          type: ["integer", "null"]
        isPinned:
          type: boolean

    # ── Holidays ──────────────────────────────────────────────────────────────
    Holiday:
      type: object
      required: [id, name, date, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        date:
          type: string
        description:
          type: ["string", "null"]
        isOptional:
          type: boolean
        createdAt:
          type: string

    HolidayInput:
      type: object
      required: [name, date]
      properties:
        name:
          type: string
          minLength: 1
        date:
          type: string
        description:
          type: ["string", "null"]
        isOptional:
          type: boolean
          default: false

    HolidayUpdate:
      type: object
      properties:
        name:
          type: string
        date:
          type: string
        description:
          type: ["string", "null"]
        isOptional:
          type: boolean

    # ── Dashboard ─────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [totalEmployees, newHiresThisMonth, openLeaveRequests, presentToday, onLeaveToday, upcomingBirthdays]
      properties:
        totalEmployees:
          type: integer
        newHiresThisMonth:
          type: integer
        openLeaveRequests:
          type: integer
        presentToday:
          type: integer
        onLeaveToday:
          type: integer
        upcomingBirthdays:
          type: integer
        upcomingAnniversaries:
          type: integer

    MyStats:
      type: object
      required: [attendanceStatus, leaveBalances, upcomingHolidays]
      properties:
        attendanceStatus:
          type: ["string", "null"]
        checkIn:
          type: ["string", "null"]
        checkOut:
          type: ["string", "null"]
        leaveBalances:
          type: array
          items:
            $ref: "#/components/schemas/LeaveBalance"
        upcomingHolidays:
          type: array
          items:
            $ref: "#/components/schemas/Holiday"
        pendingLeaveRequests:
          type: integer

    HeadcountByDept:
      type: object
      required: [departmentName, count]
      properties:
        departmentId:
          type: integer
        departmentName:
          type: string
        count:
          type: integer

    LeaveTrendPoint:
      type: object
      required: [month, total, approved, rejected]
      properties:
        month:
          type: string
        total:
          type: integer
        approved:
          type: integer
        rejected:
          type: integer
        pending:
          type: integer

    UpcomingEvent:
      type: object
      required: [type, title, date]
      properties:
        type:
          type: string
          enum: [holiday, birthday, anniversary, leave]
        title:
          type: string
        date:
          type: string
        employeeId:
          type: ["integer", "null"]
        employeeName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]

    TeamAttendanceSnapshot:
      type: object
      required: [present, absent, onLeave, wfh, total]
      properties:
        present:
          type: integer
        absent:
          type: integer
        onLeave:
          type: integer
        wfh:
          type: integer
        total:
          type: integer
        records:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRecord"

    PendingApprovals:
      type: object
      required: [count, requests]
      properties:
        count:
          type: integer
        requests:
          type: array
          items:
            $ref: "#/components/schemas/LeaveRequest"

    HeadcountPoint:
      type: object
      required: [month, count]
      properties:
        month:
          type: string
        count:
          type: integer

    LeaveUtilizationPoint:
      type: object
      required: [leaveTypeName, totalDays, byDepartment]
      properties:
        leaveTypeId:
